<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Session Note Prototype</title>
    <style>
      :root {
        --teal: #0e7a95;
        --teal-hover: #0b6a82;
        --teal-dark: #095c70;
        --text: #101828;
        --heading: #3f4b6b;
        --muted: #6b7a90;
        --panel-border: #d4dbe6;
        --overlay: rgba(30, 41, 59, 0.25);
        --shadow: 0 20px 60px rgba(16, 24, 40, 0.16);
        --radius-lg: 14px;
        --radius-md: 10px;
        --radius-sm: 10px;
        --font-ui: "Proxima Nova", "proxima-nova", "Avenir Next", "Segoe UI", Arial, sans-serif;
      }

      html, body {
        height: 100%;
        margin: 0;
        font-family: var(--font-ui);
        color: var(--text);
        background: #eef2f6;
      }

      * { box-sizing: border-box; }

      .page {
        min-height: 100%;
        padding: clamp(16px, 3vw, 28px);
        background:
          radial-gradient(900px 280px at 85% 12%, rgba(14, 122, 149, 0.18), transparent 58%),
          radial-gradient(700px 260px at 15% 70%, rgba(14, 122, 149, 0.10), transparent 60%),
          linear-gradient(180deg, #f4f7fb, #eef2f6);
      }

      .page-card,
      .notes-card {
        width: min(980px, 100%);
        margin: 0 auto;
        background: #fff;
        border-radius: 14px;
        border: 1px solid rgba(207, 214, 227, 0.9);
        box-shadow: 0 12px 40px rgba(16, 24, 40, 0.06);
        padding: clamp(14px, 2vw, 18px);
      }

      .notes-card {
        margin-top: 24px;
        font-size: 14px;
      }

      .notes-card h3 {
        margin: 0 0 10px 0;
        font-size: 16px;
      }

      .notes-card p,
      .notes-card li {
        line-height: 1.45;
      }

      .page-row {
        display: flex;
        align-items: center;
        justify-content: space-between;
        gap: 12px;
        flex-wrap: wrap;
      }

      .page-title {
        margin: 0;
        font-size: 18px;
        font-weight: 700;
        color: #263244;
      }

      .page-note {
        margin: 12px 0 0;
        color: #6b7a90;
        font-size: 13px;
      }

      .button-row {
        display: flex;
        gap: 10px;
        flex-wrap: wrap;
      }

      .btn-primary,
      .btn-secondary,
      .copy-small {
        font-family: var(--font-ui);
      }

      .btn-primary {
        display: inline-flex;
        align-items: center;
        justify-content: center;
        gap: 10px;
        padding: 12px 20px;
        border-radius: 8px;
        border: 0;
        background: var(--teal);
        color: #fff;
        font-size: 14px;
        font-weight: 700;
        cursor: pointer;
        box-shadow: 0 6px 18px rgba(14, 122, 149, 0.2);
      }

      .btn-primary:hover { background: var(--teal-hover); }
      .btn-primary[disabled] { opacity: 0.5; cursor: not-allowed; }
      .btn-primary.is-copied { background: var(--teal-dark); }

      .btn-secondary {
        display: inline-flex;
        align-items: center;
        gap: 10px;
        padding: 10px 14px;
        border-radius: 8px;
        border: 1px solid rgba(14, 122, 149, 0.3);
        background: rgba(14, 122, 149, 0.08);
        color: var(--teal);
        font-size: 13px;
        font-weight: 700;
        cursor: pointer;
      }

      .overlay {
        position: fixed;
        inset: 0;
        background: var(--overlay);
        backdrop-filter: blur(6px);
        display: grid;
        place-items: center;
        padding: clamp(12px, 3vw, 28px);
        z-index: 9999;
      }

      .modal {
        width: min(1180px, 100%);
        height: min(88vh, 820px);
        background: #fff;
        border-radius: var(--radius-lg);
        box-shadow: var(--shadow);
        border: 1px solid rgba(207, 214, 227, 0.75);
        overflow: hidden;
        display: flex;
        flex-direction: column;
      }

      .modal-header {
        position: relative;
        min-height: 92px;
        padding: 0 72px;
        display: flex;
        align-items: center;
        justify-content: center;
        border-bottom: 1px solid #d9dee7;
        background: #fff;
        flex-shrink: 0;
      }

      .modal-title {
        margin: 0;
        font-size: 23px;
        font-weight: 700;
        letter-spacing: -0.01em;
        line-height: 1;
        color: #2f3d5c;
        text-align: center;
      }

      .x-btn {
        position: absolute;
        right: 24px;
        top: 50%;
        transform: translateY(-50%);
        width: 52px;
        height: 52px;
        border-radius: 12px;
        border: 1px solid transparent;
        background: transparent;
        cursor: pointer;
        display: grid;
        place-items: center;
        padding: 0;
      }

      .x-btn:hover {
        background: #f5f7fb;
        border-color: #d9dee7;
      }

      .x-btn svg {
        width: 28px;
        height: 28px;
        color: #2f3d5c;
      }

      .modal-body {
        padding: 20px 28px 16px;
        background: #fff;
        flex: 1;
        min-height: 0;
        display: flex;
        flex-direction: column;
        overflow: hidden;
      }

      .toolbar {
        margin-bottom: 12px;
        flex-shrink: 0;
      }

      .copy-mode {
        display: inline-flex;
        align-items: center;
        gap: 12px;
        flex-wrap: wrap;
        font-size: 13px;
      }

      .copy-mode-label {
        color: var(--muted);
        font-weight: 600;
      }

      .copy-mode-option {
        display: inline-flex;
        align-items: center;
        gap: 6px;
        user-select: none;
      }

      .content-grid {
        flex: 1;
        min-height: 0;
        display: grid;
        grid-template-columns: minmax(0, 1.5fr) minmax(340px, 0.9fr);
        gap: 14px;
      }

      .panel {
        border: 2px solid var(--panel-border);
        border-radius: var(--radius-md);
        background: #fff;
        padding: 18px 18px 14px;
        min-height: 0;
        display: flex;
        flex-direction: column;
        overflow: hidden;
      }

      .panel-header {
        display: flex;
        align-items: flex-start;
        justify-content: space-between;
        gap: 12px;
        margin-bottom: 12px;
        flex-wrap: wrap;
        flex-shrink: 0;
      }

      .panel-header-comments {
        align-items: center;
      }

      .panel-header-comments .panel-title-sm {
        margin-right: auto;
      }

      .panel-header-comments .sn-right {
        margin-left: auto;
        align-items: center;
        gap: 10px;
        flex-wrap: nowrap;
      }

      .panel-header-comments .save-status {
        min-width: auto;
        white-space: nowrap;
        text-align: right;
      }

      .panel-title-lg {
        margin: 0;
        font-size: 19px;
        font-weight: 700;
        letter-spacing: -0.005em;
        color: #2a374b;
      }

      .panel-title-sm {
        margin: 0;
        font-size: 16px;
        font-weight: 600;
        letter-spacing: -0.003em;
        color: #2a374b;
      }

      .summary-scroll {
        border: 1px solid #d8dee9;
        border-radius: var(--radius-sm);
        background: #fff;
        padding: 22px 20px 24px;
        flex: 1;
        min-height: 0;
        overflow: auto;
      }

      .summary-scroll::-webkit-scrollbar,
      .comments-area::-webkit-scrollbar {
        width: 10px;
      }

      .summary-scroll::-webkit-scrollbar-track,
      .comments-area::-webkit-scrollbar-track {
        background: #eef2f6;
        border-radius: 10px;
      }

      .summary-scroll::-webkit-scrollbar-thumb,
      .comments-area::-webkit-scrollbar-thumb {
        background: #2f3d52;
        border-radius: 10px;
      }

      .summary-content {
        max-width: 900px;
        font-size: 18px;
        line-height: 1.28;
        color: #0f172a;
      }

      .summary-main-title {
        margin: 0 0 18px 0;
        font-size: 39px;
        line-height: 1.02;
        font-weight: 700;
        letter-spacing: -0.02em;
        color: var(--heading);
      }

      .summary-block { margin-top: 28px; }
      .summary-block:first-of-type { margin-top: 0; }

      .summary-label {
        font-size: 28px;
        line-height: 1.04;
        font-weight: 700;
        letter-spacing: -0.015em;
        color: var(--heading);
        margin: 0 0 10px 0;
      }

      .summary-subtitle {
        font-size: 23px;
        line-height: 1.08;
        font-weight: 700;
        margin: 0 0 8px 0;
        color: #0f172a;
      }

      .summary-line {
        margin: 0;
        font-size: 18px;
        line-height: 1.28;
        font-weight: 400;
        color: #0f172a;
      }

      .summary-list {
        margin: 0;
        padding-left: 1.6em;
      }

      .summary-list > li {
        margin: 0 0 6px 0;
        font-size: 18px;
        line-height: 1.28;
      }

      .summary-list .summary-list {
        margin-top: 8px;
        padding-left: 1.45em;
        list-style-type: lower-alpha;
      }

      .summary-results-group { margin-top: 12px; }

      .summary-results-heading {
        font-size: 20px;
        line-height: 1.1;
        font-weight: 700;
        margin: 0 0 8px 0;
        color: #0f172a;
      }

      .questionnaire-item { margin-bottom: 10px; }
      .questionnaire-item:last-child { margin-bottom: 0; }

      .comments-area {
        display: block;
        width: 100%;
        max-width: 100%;
        flex: 1;
        min-height: 0;
        resize: none;
        border: 1px solid #d8dee9;
        border-radius: var(--radius-sm);
        padding: 12px;
        font-size: 14px;
        line-height: 1.45;
        font-family: var(--font-ui);
        outline: none;
        background: #fff;
        color: var(--text);
        overflow: auto;
      }

      .comments-area:focus {
        border-color: rgba(14, 122, 149, 0.6);
        box-shadow: 0 0 0 4px rgba(14, 122, 149, 0.12);
      }

      .hint {
        margin-top: 8px;
        color: var(--muted);
        font-size: 12px;
        flex-shrink: 0;
      }

      .copy-small {
        display: inline-flex;
        align-items: center;
        justify-content: center;
        min-width: 64px;
        padding: 8px 10px;
        border-radius: 10px;
        border: 1px solid rgba(14, 122, 149, 0.3);
        background: rgba(14, 122, 149, 0.08);
        color: var(--teal);
        font-size: 13px;
        font-weight: 700;
        cursor: pointer;
        user-select: none;
      }

      .copy-small:hover {
        background: rgba(14, 122, 149, 0.12);
        border-color: rgba(14, 122, 149, 0.45);
      }

      .copy-small[disabled] {
        opacity: 0.5;
        cursor: not-allowed;
      }

      .copy-small.is-copied {
        background: var(--teal-dark) !important;
        border-color: var(--teal-dark) !important;
        color: #fff !important;
      }

      .sn-right {
        display: flex;
        align-items: center;
        gap: 10px;
        flex-wrap: wrap;
      }

      .save-status {
        font-size: 12px;
        color: var(--muted);
        min-width: 110px;
        text-align: right;
      }

      .save-status.is-saved { color: var(--teal); }
      .save-status.is-error { color: #b42318; }

      .modal-footer {
        padding: 16px 26px 22px;
        display: flex;
        justify-content: center;
        background: #fff;
        flex-shrink: 0;
      }

      .modal-footer .btn-primary {
        min-width: 180px;
        width: min(240px, 100%);
      }

      @media (max-width: 900px) {
        .modal-body, .modal-footer {
          padding-left: 16px;
          padding-right: 16px;
        }

        .content-grid {
          grid-template-columns: 1fr;
          grid-template-rows: minmax(0, 1fr) minmax(220px, 0.7fr);
        }

        .summary-main-title { font-size: 30px; }
        .summary-label { font-size: 22px; }
        .summary-subtitle { font-size: 20px; }
        .summary-line, .summary-list > li, .summary-content { font-size: 16px; }
        .summary-results-heading { font-size: 18px; }
      }

      @media (max-width: 640px) {
        .modal { height: min(92vh, 900px); }
        .modal-header { min-height: 74px; padding: 0 56px 0 16px; }
        .modal-title { font-size: 20px; }
        .x-btn { right: 12px; width: 44px; height: 44px; }
        .x-btn svg { width: 24px; height: 24px; }
        .panel { padding: 14px; }

        .panel-header-comments { align-items: flex-start; }
        .panel-header-comments .sn-right {
          width: 100%;
          flex-wrap: wrap;
          margin-left: 0;
        }

        .modal-footer .btn-primary { width: 100%; }
        .summary-scroll { padding: 18px 16px 20px; }
        .summary-main-title { font-size: 24px; }
        .summary-label { font-size: 18px; }
        .summary-subtitle { font-size: 17px; }
        .summary-line, .summary-list > li, .summary-content { font-size: 15px; }
        .summary-results-heading { font-size: 16px; }

        .content-grid {
          grid-template-columns: 1fr;
          grid-template-rows: minmax(0, 1fr) minmax(180px, 0.8fr);
          gap: 12px;
        }
      }
    </style>
  </head>

  <body>
    <div class="page">
      <div class="page-card">
        <div class="page-row">
          <h1 class="page-title">Portal page mock</h1>
          <div class="button-row">
            <button class="btn-primary" type="button" id="openSessionNoteBtn">
              Open Session Note <span aria-hidden="true">›</span>
            </button>
            <button class="btn-secondary" type="button" id="clearDraftBtn">
              Clear saved draft (prototype)
            </button>
          </div>
        </div>
        <p class="page-note">
          This prototype simulates your portal behavior: the modal is created fresh each time you open it, but the Comments draft persists and shows Saved status.
        </p>
      </div>

      <div class="notes-card">
        <h3>Developer Notes</h3>
        <p><strong>Purpose</strong><br>Allow clinicians to quickly copy a session summary with optional comments.</p>
      </div>
    </div>

    <script>
      (function () {
        const STORAGE_KEY = "session_note_additional_comments_draft_v1";

        function debounce(fn, waitMs) {
          let timer = null;
          return function () {
            const args = arguments;
            clearTimeout(timer);
            timer = setTimeout(function () {
              fn.apply(null, args);
            }, waitMs);
          };
        }

        function nowTime() {
          const d = new Date();
          return d.toLocaleTimeString([], { hour: "2-digit", minute: "2-digit" });
        }

        function setSaveStatus(el, state, text) {
          if (!el) return;
          el.classList.remove("is-saving", "is-saved", "is-error");
          if (state) el.classList.add(state);
          el.textContent = text;
        }

        function getCopyMode(root) {
          const checked = root.querySelector('input[name="copy_mode"]:checked');
          return checked ? checked.value : "plain";
        }

        function escapeHtml(text) {
          return String(text || "")
            .replace(/&/g, "&amp;")
            .replace(/</g, "&lt;")
            .replace(/>/g, "&gt;")
            .replace(/"/g, "&quot;")
            .replace(/'/g, "&#39;");
        }

        function commentsHtml(value) {
          const safe = escapeHtml(value || "").replace(/\n/g, "<br>");
          return (
            '<div style="font-family: Proxima Nova, Avenir Next, Segoe UI, Arial, sans-serif; color:#0f172a;">' +
              '<div style="font-size:39px; line-height:1.02; font-weight:700; letter-spacing:-0.02em; color:#3f4b6b; margin:0 0 18px 0;">' +
                'Additional Comments' +
              '</div>' +
              '<div style="font-size:18px; line-height:1.45; color:#0f172a;">' +
                safe +
              '</div>' +
            '</div>'
          );
        }

        function copyPlainText(text) {
          const cleaned = (text || "").trim();
          if (!cleaned) return false;

          const ta = document.createElement("textarea");
          ta.value = cleaned;
          ta.setAttribute("readonly", "");
          ta.style.position = "fixed";
          ta.style.left = "-9999px";
          ta.style.top = "0";
          document.body.appendChild(ta);
          ta.focus();
          ta.select();

          let ok = false;
          try {
            ok = document.execCommand("copy");
          } catch (e) {
            ok = false;
          }

          document.body.removeChild(ta);
          return ok;
        }

        function copyRichText(html, plainText) {
          const cleaned = (plainText || "").trim();
          if (!cleaned) return false;

          const container = document.createElement("div");
          container.contentEditable = "true";
          container.style.position = "fixed";
          container.style.left = "-9999px";
          container.style.top = "0";
          container.style.opacity = "0";
          container.innerHTML = html;
          document.body.appendChild(container);

          const selection = window.getSelection();
          const range = document.createRange();
          range.selectNodeContents(container);
          selection.removeAllRanges();
          selection.addRange(range);

          let ok = false;
          try {
            ok = document.execCommand("copy");
          } catch (e) {
            ok = false;
          }

          selection.removeAllRanges();
          document.body.removeChild(container);

          if (!ok) return copyPlainText(cleaned);
          return true;
        }

        function copyByMode(root, plainText, html) {
          const mode = getCopyMode(root);
          if (mode === "formatted") {
            return copyRichText(html, plainText);
          }
          return copyPlainText(plainText);
        }

        function flashCopied(button, originalText, reenableFn) {
          if (!button) return;

          button.textContent = "Copied ✓";
          button.classList.add("is-copied");

          const keepDisabled =
            button.dataset.copyButton === "comments" ||
            button.dataset.copyButton === "both";

          if (!keepDisabled) button.disabled = true;

          setTimeout(function () {
            button.textContent = originalText;
            button.classList.remove("is-copied");
            if (typeof reenableFn === "function") {
              reenableFn();
            } else {
              button.disabled = false;
            }
          }, 2000);
        }

        function summaryHtmlContent() {
          return (
            '<h4 class="summary-main-title">Session Summary</h4>' +

            '<div class="summary-block">' +
              '<div class="summary-subtitle">Patient Details</div>' +
              '<p class="summary-line">Patient ID: all tasks and questionnaires</p>' +
              '<p class="summary-line">Date of Birth: 1998/09/03</p>' +
              '<p class="summary-line">Comparative Group: Females, 18-24</p>' +
            '</div>' +

            '<div class="summary-block">' +
              '<div class="summary-subtitle">Assessment Details</div>' +
              '<p class="summary-line">Date Administered: 2022/11/04</p>' +
              '<p class="summary-line">Date Completed: 2022/11/04</p>' +
              '<p class="summary-line">Duration: 27 minutes</p>' +
              '<p class="summary-line">Administration Method: In Person</p>' +
            '</div>' +

            '<div class="summary-block">' +
              '<div class="summary-subtitle">Provider Details</div>' +
              '<p class="summary-line">Provider Name: Neta Benor</p>' +
              '<p class="summary-line">Organization: neta ben or</p>' +
            '</div>' +

            '<div class="summary-block">' +
              '<div class="summary-label">Assessments Administered</div>' +
              '<ol class="summary-list">' +
                '<li>Custom protocol' +
                  '<ol class="summary-list">' +
                    '<li>Visual Spatial Working Memory</li>' +
                    '<li>Spatial Short Term Memory</li>' +
                    '<li>Working Memory</li>' +
                    '<li>Episodic Memory</li>' +
                    '<li>Mental Rotation</li>' +
                    '<li>Visuospatial Processing</li>' +
                    '<li>Deductive Reasoning</li>' +
                    '<li>Planning</li>' +
                    '<li>Verbal Reasoning</li>' +
                    '<li>Verbal Short Term Memory</li>' +
                    '<li>Attention</li>' +
                    '<li>Response Inhibition</li>' +
                  '</ol>' +
                '</li>' +
                '<li>PHQ-9</li>' +
                '<li>GAD-7</li>' +
                '<li>ASRS</li>' +
                '<li>PSS</li>' +
                '<li>RPQ</li>' +
                '<li>PCL-5</li>' +
                '<li>VADRS</li>' +
                '<li>AQ</li>' +
                '<li>DAST-10</li>' +
                '<li>AUDIT</li>' +
                '<li>IADL</li>' +
                '<li>MDQ</li>' +
              '</ol>' +
            '</div>' +

            '<div class="summary-block">' +
              '<div class="summary-label">Cognitive Assessment Results</div>' +

              '<div class="summary-results-group">' +
                '<div class="summary-results-heading">Below Average Range</div>' +
                '<ul class="summary-list">' +
                  '<li>Episodic Memory - Standard score of 83, 12th percentile, below the average range.</li>' +
                  '<li>Verbal Short Term Memory - Standard score of 84, 14th percentile, below the average range.</li>' +
                '</ul>' +
              '</div>' +

              '<div class="summary-results-group">' +
                '<div class="summary-results-heading">Within Average Range</div>' +
                '<ul class="summary-list">' +
                  '<li>Visual Spatial Working Memory - Standard score of 93, 34th percentile, within the average range.</li>' +
                  '<li>Spatial Short Term Memory - Standard score of 96, 40th percentile, within the average range.</li>' +
                  '<li>Working Memory - Standard score of 88, 22nd percentile, within the average range.</li>' +
                  '<li>Mental Rotation - Standard score of 95, 38th percentile, within the average range.</li>' +
                  '<li>Visuospatial Processing - Standard score of 97, 43rd percentile, within the average range.</li>' +
                  '<li>Deductive Reasoning - Standard score of 95, 38th percentile, within the average range.</li>' +
                  '<li>Verbal Reasoning - Standard score of 95, 38th percentile, within the average range.</li>' +
                  '<li>Attention - Standard score of 94, 34th percentile, within the average range.</li>' +
                  '<li>Response Inhibition - Standard score of 88, 21st percentile, within the average range.</li>' +
                '</ul>' +
              '</div>' +

              '<div class="summary-results-group">' +
                '<div class="summary-results-heading">Above Average Range</div>' +
                '<ul class="summary-list">' +
                  '<li>Planning - Standard score of 117, 88th percentile, above the average range.</li>' +
                '</ul>' +
              '</div>' +
            '</div>' +

            '<div class="summary-block">' +
              '<div class="summary-label">Questionnaire Results</div>' +
              '<div class="questionnaire-item"><p class="summary-line">Patient Health Questionnaire (PHQ-9) - Score of 18 was recorded, which meets the threshold of 15. This score is indicative of moderately severe depression symptoms</p></div>' +
              '<div class="questionnaire-item"><p class="summary-line">General Anxiety Disorder (GAD-7) - Score of 6 was recorded, which meets the threshold of 5. This score is indicative of mild anxiety symptoms</p></div>' +
              '<div class="questionnaire-item"><p class="summary-line">Adult ADHD Self-Report Scale (ASRS) - Score of 4 was recorded, which meets the threshold of 4. This score is indicative of symptoms that may be consistent with ADHD</p></div>' +
              '<div class="questionnaire-item"><p class="summary-line">Perceived Stress Scale (PSS) - Score of 19 was recorded, which meets the threshold of 14. This score is indicative of symptoms consistent with moderate perceived stress</p></div>' +
              '<div class="questionnaire-item"><p class="summary-line">Rivermead Post-Concussion Symptoms Questionnaire - Score of 46 was recorded, which meets the threshold of 36. This score is indicative of post-concussion syndrome and predictive of moderate to severe limitations in abilities</p></div>' +
              '<div class="questionnaire-item"><p class="summary-line">PTSD Checklist for DSM-5 (PCL-5) - Score of 52 was recorded, which meets the threshold of 34. This score is indicative of significant likelihood of PTSD, this patient may benefit from PTSD treatment</p></div>' +
              '<div class="questionnaire-item">' +
                '<p class="summary-line" style="margin-bottom:8px;">Vanderbilt ADHD Diagnostic Rating Scale (VADRS)</p>' +
                '<ul class="summary-list">' +
                  '<li>Performance: 5 of the performance behaviors were reported as \'Somewhat of a problem\' or \'Problematic\', which meets the threshold of 1 of 8 behaviors required to indicate performance impairment by the conditions below.</li>' +
                  '<li>ADHD, predominantly inattentive subtype: 8 of 9 inattentive behaviors were reported to occur \'Often\' or \'Very often\', which meets the threshold of at least 6 behaviors flagged for this disorder. Therefore, these results, along with the impaired performance, are indicative of the inattentive subtype of ADHD.</li>' +
                  '<li>ADHD, predominantly hyperactive/impulsive subtype: 4 of 9 hyperactive/impulsive behaviors were reported to occur \'Often\' or \'Very often\', which does not meet the threshold of at least 6 behaviors flagged for this disorder. Therefore, these results are not indicative of the hyperactive/impulsive subtype of ADHD.</li>' +
                  '<li>Oppositional-Defiant Disorder: 8 of 8 behaviors associated with oppositional-defiant disorder were reported to occur \'Often\' or \'Very often\', which meets the threshold of at least 4 behaviors flagged for this disorder. Therefore, these results, along with the impaired performance, are indicative of oppositional-defiant disorder.</li>' +
                  '<li>Conduct disorder: 14 of 14 behaviors associated with conduct disorder were reported to occur \'Often\' or \'Very often\', which meets the threshold of at least 3 behaviors flagged for this disorder. Therefore, these results, along with the impaired performance, are indicative of conduct disorder.</li>' +
                  '<li>Anxiety/depression: 6 of 7 behaviors associated with anxiety/depression were reported to occur \'Often\' or \'Very often\', which meets the threshold of at least 3 behaviors flagged for this disorder. Therefore, these results, along with the impaired performance, are indicative of anxiety/depression.</li>' +
                '</ul>' +
              '</div>' +
              '<div class="questionnaire-item"><p class="summary-line">Autism Spectrum Quotient (AQ) - Score of 24 was recorded, which is below the threshold of 26. This score is indicative of no markers or symptoms of autism</p></div>' +
              '<div class="questionnaire-item"><p class="summary-line">Drug Abuse Screen Test (DAST-10) - Score of 6 was recorded, which meets the threshold of 6. This score is indicative of a substantial level of problems reported that relate to drug abuse</p></div>' +
              '<div class="questionnaire-item"><p class="summary-line">Alcohol Use Disorders Identification Test (AUDIT) - Score of 23 was recorded, which meets the threshold of 15. This score is indicative of the likelihood of alcohol dependence</p></div>' +
              '<div class="questionnaire-item"><p class="summary-line">Instrumental Activities of Daily Living (IADL) - Score of 3 was recorded, which is below the threshold of 8. This score is indicative of low function, dependence</p></div>' +
              '<div class="questionnaire-item"><p class="summary-line">Mood Disorder Questionnaire (MDQ) - Score of 4 was recorded, which is below the threshold of 7. Co-occurring symptoms were not reported. Symptoms were reported to cause "moderate problems". This score is not indicative of Bipolar Spectrum Disorder.</p></div>' +
            '</div>'
          );
        }

        function modalHtml() {
          return (
            '<div class="overlay" role="dialog" aria-modal="true" aria-labelledby="session-note-title">' +
              '<div class="modal">' +
                '<div class="modal-header">' +
                  '<h2 id="session-note-title" class="modal-title">Session Note</h2>' +
                  '<button type="button" class="x-btn" aria-label="Close" data-close>' +
                    '<svg viewBox="0 0 24 24" fill="none" aria-hidden="true">' +
                      '<path d="M18 6L6 18M6 6l12 12" stroke="currentColor" stroke-width="2.8" stroke-linecap="round" />' +
                    '</svg>' +
                  '</button>' +
                '</div>' +

                '<div class="modal-body">' +
                  '<div class="toolbar">' +
                    '<div class="copy-mode" role="group" aria-label="Copy mode">' +
                      '<span class="copy-mode-label">Copy as:</span>' +
                      '<label class="copy-mode-option"><input type="radio" name="copy_mode" value="plain" checked> Plain text</label>' +
                      '<label class="copy-mode-option"><input type="radio" name="copy_mode" value="formatted"> Formatted</label>' +
                    '</div>' +
                  '</div>' +

                  '<div class="content-grid">' +
                    '<div class="panel">' +
                      '<div class="panel-header">' +
                        '<h3 class="panel-title-lg">Session Summary</h3>' +
                        '<button type="button" class="copy-small" data-copy-button="summary">Copy</button>' +
                      '</div>' +

                      '<div class="summary-scroll">' +
                        '<div class="summary-content" data-copy-source="summary">' +
                          summaryHtmlContent() +
                        '</div>' +
                      '</div>' +

                      '<div class="hint">Copy copies only the session summary section.</div>' +
                    '</div>' +

                    '<div class="panel">' +
                      '<div class="panel-header panel-header-comments">' +
                        '<h3 class="panel-title-sm">Comments</h3>' +
                        '<div class="sn-right">' +
                          '<span class="save-status" data-save-status>Not saved yet</span>' +
                          '<button type="button" class="copy-small" data-clear-comments>Clear</button>' +
                          '<button type="button" class="copy-small" data-copy-button="comments" disabled>Copy</button>' +
                        '</div>' +
                      '</div>' +

                      '<textarea class="comments-area" placeholder="Add any additional context you’d like to copy into notes…" data-comments-input></textarea>' +
                      '<div class="hint">Autosaves as you type. Reopening the modal shows the last saved draft.</div>' +
                    '</div>' +
                  '</div>' +
                '</div>' +

                '<div class="modal-footer">' +
                  '<button type="button" class="btn-primary" data-copy-button="both" disabled>Copy both</button>' +
                '</div>' +
              '</div>' +
            '</div>'
          );
        }

        function wireModal(root) {
          const overlay = root.querySelector(".overlay");
          const closeButtons = root.querySelectorAll("[data-close]");
          const summarySource = root.querySelector("[data-copy-source='summary']");
          const commentsInput = root.querySelector("[data-comments-input]");
          const statusEl = root.querySelector("[data-save-status]");
          const summaryBtn = root.querySelector("[data-copy-button='summary']");
          const commentsBtn = root.querySelector("[data-copy-button='comments']");
          const bothBtn = root.querySelector("[data-copy-button='both']");
          const clearBtn = root.querySelector("[data-clear-comments]");

          function summaryText() {
            return summarySource ? summarySource.innerText.trim() : "";
          }

          function summaryHtml() {
            return summarySource ? summarySource.innerHTML : "";
          }

          function commentsText() {
            return commentsInput ? commentsInput.value : "";
          }

          function syncButtons() {
            const hasComments = commentsText().trim().length > 0;
            if (commentsBtn) commentsBtn.disabled = !hasComments;
            if (bothBtn) bothBtn.disabled = !hasComments;
          }

          function close() {
            if (overlay) overlay.remove();
          }

          closeButtons.forEach(function (btn) {
            btn.addEventListener("click", close);
          });

          const saved = localStorage.getItem(STORAGE_KEY);
          if (saved !== null && commentsInput) {
            commentsInput.value = saved;
            setSaveStatus(statusEl, "is-saved", "Saved ✓ " + nowTime());
          } else {
            setSaveStatus(statusEl, "", "Not saved yet");
          }

          const saveDraft = debounce(function () {
            try {
              localStorage.setItem(STORAGE_KEY, commentsText());
              setSaveStatus(statusEl, "is-saved", "Saved ✓ " + nowTime());
            } catch (e) {
              setSaveStatus(statusEl, "is-error", "Not saved");
            }
          }, 350);

          if (commentsInput) {
            commentsInput.addEventListener("input", function () {
              setSaveStatus(statusEl, "is-saving", "Saving…");
              saveDraft();
              syncButtons();
            });
          }

          if (clearBtn) {
            clearBtn.addEventListener("click", function () {
              commentsInput.value = "";
              localStorage.setItem(STORAGE_KEY, "");
              syncButtons();
              setSaveStatus(statusEl, "is-saved", "Saved ✓ " + nowTime());
            });
          }

          if (summaryBtn) {
            summaryBtn.addEventListener("click", function () {
              const ok = copyByMode(root, summaryText(), summaryHtml());
              if (ok) flashCopied(summaryBtn, "Copy");
            });
          }

          if (commentsBtn) {
            commentsBtn.addEventListener("click", function () {
              const text = commentsText();
              const html = commentsHtml(text);
              const ok = copyByMode(root, text, html);
              if (ok) flashCopied(commentsBtn, "Copy", syncButtons);
            });
          }

          if (bothBtn) {
            bothBtn.addEventListener("click", function () {
              const combinedPlain = summaryText() + "\n\nAdditional Comments\n" + (commentsText() || "");
              const combinedHtml = summaryHtml() + '<div style="height:24px;"></div>' + commentsHtml(commentsText());
              const ok = copyByMode(root, combinedPlain, combinedHtml);
              if (ok) flashCopied(bothBtn, "Copy both", syncButtons);
            });
          }

          window.addEventListener("keydown", function onEsc(ev) {
            if (ev.key === "Escape") close();
          }, { once: true });

          syncButtons();
        }

        function openModalFresh() {
          document.querySelectorAll(".overlay").forEach(function (el) {
            el.remove();
          });
          const wrapper = document.createElement("div");
          wrapper.innerHTML = modalHtml();
          document.body.appendChild(wrapper);
          wireModal(wrapper);
          const textarea = wrapper.querySelector("[data-comments-input]");
          if (textarea) textarea.focus();
        }

        document.getElementById("openSessionNoteBtn").addEventListener("click", openModalFresh);
        document.getElementById("clearDraftBtn").addEventListener("click", function () {
          localStorage.removeItem(STORAGE_KEY);
          alert("Saved draft cleared (prototype). Open Session Note again to see it blank.");
        });
      })();
    </script>
  </body>
</html>
